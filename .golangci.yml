version: "2"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/flexphere/gaze

linters:
  enable:
    - errcheck
    - errorlint
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nilerr
    - staticcheck
    - unconvert
    - unused
  settings:
    errcheck:
      check-type-assertions: true
    gosec:
      severity: medium
      confidence: medium
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
